<script>
function predict(){

let marathi = Number(document.getElementById("marathi").value);
let english = Number(document.getElementById("english").value);
let maths = Number(document.getElementById("maths").value);
let science = Number(document.getElementById("science").value);
let social = Number(document.getElementById("social").value);

let total = marathi + english + maths + science + social;
let percentage = total / 5;

let grade = "";
let status = "";
let stream = "";

// Grade
if(percentage >= 90){
    grade = "A+ 🏆";
    status = "Excellent";
}
else if(percentage >= 75){
    grade = "A ⭐";
    status = "Very Good";
}
else if(percentage >= 60){
    grade = "B 👍";
    status = "Good";
}
else if(percentage >= 35){
    grade = "C 🙂";
    status = "Pass";
}
else{
    grade = "F ❌";
    status = "Need Improvement";
}

// Future Stream Prediction
if(percentage >= 85){
    stream = "🔬 Science (JEE / NEET / CET)";
}
else if(percentage >= 70){
    stream = "🧪 Science / Commerce";
}
else if(percentage >= 50){
    stream = "💼 Commerce / Arts";
}
else{
    stream = "📚 Focus on Basics & Skill Development";
}

document.getElementById("result").innerHTML =
"📊 Total Marks: " + total + "/500" +
"<br>📈 Percentage: " + percentage.toFixed(2) + "%" +
"<br>🏅 Grade: " + grade +
"<br>📌 Status: " + status +
"<br>🎯 Suggested Stream: " + stream;

}
